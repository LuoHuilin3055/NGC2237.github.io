<script>
  let tocCollapsed = false;
  
  function toggleTOC() {
    const tocContent = document.getElementById('toc-content');
    const button = event.target.closest('button');
    const buttonText = document.getElementById('toc-toggle-text');
    
    if (tocCollapsed) {
      tocContent.style.maxHeight = '1000px';
      tocContent.style.opacity = '1';
      buttonText.textContent = '收起';
    } else {
      tocContent.style.maxHeight = '0';
      tocContent.style.opacity = '0';
      buttonText.textContent = '展开';
    }
    
    tocCollapsed = !tocCollapsed;
  }
  
  
  document.addEventListener('DOMContentLoaded', function() {
    
    const headings = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
    const tocLinks = document.querySelectorAll('.enhanced-toc a');
    
    if (headings.length > 0 && tocLinks.length > 0) {
      const observerOptions = {
        root: null,
        rootMargin: '-10% 0px -80% 0px',
        threshold: 0
      };
      
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.getAttribute('id');
            tocLinks.forEach(link => {
              link.classList.remove('active');
              if (link.getAttribute('href') === '#' + id) {
                link.classList.add('active');
                
                const tocContainer = document.getElementById('toc-container');
                const activeLink = link;
                
                if (tocContainer && activeLink) {
                  
                  
                  const containerRect = tocContainer.getBoundingClientRect();
                  const linkRect = activeLink.getBoundingClientRect();
                  
                  
                  const relativeTop = linkRect.top - containerRect.top;
                  
                  
                  const scrollPosition = tocContainer.scrollTop + relativeTop - (containerRect.height / 2) + (linkRect.height / 2);
                  
                  
                  const finalScrollPosition = Math.max(0, scrollPosition);
                  
                  
                  tocContainer.scrollTo({
                    top: finalScrollPosition,
                    behavior: 'smooth'
                  });
                }
              }
            });
          }
        });
      }, observerOptions);
      
      headings.forEach(heading => {
        if (heading.getAttribute('id')) {
          observer.observe(heading);
        }
      });
    }
    
    
    const tocItems = document.querySelectorAll('.enhanced-toc li');
    tocItems.forEach(item => {
      const sublist = item.querySelector('ul');
      if (sublist) {
        const toggle = document.createElement('button');
        toggle.className = 'toc-toggle';
        toggle.innerHTML = '▶';
        toggle.onclick = function() {
          sublist.style.display = sublist.style.display === 'none' ? 'block' : 'none';
          this.innerHTML = sublist.style.display === 'none' ? '▶' : '▼';
        };
        const link = item.querySelector('a');
        if (link) {
          link.parentNode.insertBefore(toggle, link);
        }
      }
    });
  });
</script>

            const images = document.querySelectorAll('img');

                document.body.style.overflow = 'auto';
            }
            
            lightboxClose.addEventListener('click', closeLightbox);
            
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });
            
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {

                }
            });
