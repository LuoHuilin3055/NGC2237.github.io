    const resultsContainer = document.getElementById('search-results');

    }

    <script>
        
        window.addEventListener('scroll', function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("readingProgress").style.width = scrolled + "%";
        });
        
        
        document.addEventListener('DOMContentLoaded', function() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightboxImage');
            const lightboxClose = document.getElementById('lightboxClose');
            
            
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.addEventListener('click', function() {
                    lightboxImage.src = this.src;
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });
            });
            
            
            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
            
            lightboxClose.addEventListener('click', closeLightbox);
            
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });
            
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            });
            
            
            function createFireworks(x, y) {
                const colors = ['#00ffff', '#a5b4fc', '#ffffff', '#ff79c6', '#50fa7b', '#bd93f9', '#ffb86c', '#ff5555'];
                const particles = 25;
                const maxParticles = 120;
                let currentParticles = 0;
                
                for (let i = 0; i < particles; i++) {
                    if (currentParticles >= maxParticles) break;
                    
                    const particle = document.createElement('div');
                    const size = Math.random() * 4 + 2;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    particle.style.cssText = `
                        position: fixed;
                        left: ${x}px;
                        top: ${y}px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        border-radius: 50%;
                        pointer-events: none;
                        z-index: 9999;
                        box-shadow: 0 0 ${size * 2}px ${color};
                    `;
                    
                    document.body.appendChild(particle);
                    currentParticles++;
                    
                    const angle = (Math.PI * 2 / particles) * i + Math.random() * 0.2;
                    const distance = 60 + Math.random() * 40;
                    const vx = Math.cos(angle) * distance * 0.06;
                    const vy = Math.sin(angle) * distance * 0.06;
                    
                    let px = 0, py = 0;
                    let alpha = 0;
                    let scale = 0;
                    let gravity = 0.3;
                    
                    function animate() {
                        px += vx;
                        py += vy + gravity;
                        gravity += 0.03;
                        alpha = Math.min(alpha + 0.1, 1);
                        scale = Math.min(scale + 0.1, 1);
                        
                        if (alpha > 0.7) {
                            alpha -= 0.03;
                        }
                        
                        if (alpha <= 0) {
                            document.body.removeChild(particle);
                            currentParticles--;
                            return;
                        }
                        
                        particle.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
                        particle.style.opacity = alpha;
                        requestAnimationFrame(animate);
                    }
                    
                    requestAnimationFrame(animate);
                }
            }
            
            
            let lastClickTime = 0;
            const clickCooldown = 200; 
            
            
            document.addEventListener('click', function(e) {
                const currentTime = Date.now();
                if (currentTime - lastClickTime < clickCooldown) {
                    return;
                }
                lastClickTime = currentTime;
                
                
                if (!lightbox.classList.contains('active')) {
                    createFireworks(e.clientX, e.clientY);
                }
            });
        });
    </script>
