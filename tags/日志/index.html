  function performSearch(query) {
    const resultsContainer = document.getElementById('search-results');
    
    if (!query.trim()) {
      resultsContainer.innerHTML = '';
      return;
    }
    
    
    const results = searchData.filter(item => {
      const searchTerm = query.toLowerCase();
      return item.title.toLowerCase().includes(searchTerm) || 
             item.content.toLowerCase().includes(searchTerm) ||
             item.tags.some(tag => tag.toLowerCase().includes(searchTerm));
    });
    
    
    if (results.length > 0) {
      resultsContainer.innerHTML = results.map(item => `
        <a href="${item.url}" style="
          display: block;
          padding: 12px;
          color: #fff;
          text-decoration: none;
          border-radius: 5px;
          transition: all 0.3s ease;
          margin-bottom: 8px;
        " onmouseover="this.style.background='rgba(0,255,255,0.1)'; this.style.color='#00ffff'" onmouseout="this.style.background='none'; this.style.color='#fff'">
          <div style="font-weight: bold; margin-bottom: 5px; font-size: 1em;">${item.title}</div>
          <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">${item.date}</div>
          ${item.tags.length > 0 ? `<div style="font-size: 0.7em; color: #00ffff; display: flex; flex-wrap: wrap; gap: 4px;">${item.tags.map(tag => `<span style="background: rgba(0,255,255,0.1); padding: 2px 8px; border-radius: 10px;">${tag}</span>`).join('')}</div>` : ''}
        </a>
      `).join('');
    } else {
      resultsContainer.innerHTML = `
        <div style="padding: 20px; text-align: center; color: #aaa;">
          没有找到相关内容
        </div>
      `;
    }
  }

    const searchResults = document.getElementById('search-results');
    
    if (searchContainer && !searchContainer.contains(e.target)) {
      searchResults.style.display = 'none';
    }
  });
